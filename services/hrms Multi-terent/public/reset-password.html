<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Softrate Global</title>
    <!-- Include Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-body: 'Outfit', sans-serif;
            --font-heading: 'Outfit', sans-serif;
            --text-sm: 0.875rem;
            --text-lg: 1.125rem;
            --text-2xl: 1.5rem;
            --text-4xl: 2.25rem;
            --text-5xl: 3rem;
            --text-6xl: 3.75rem;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;
            --font-weight-bold: 700;
            --font-weight-extrabold: 800;
            --error: #EF4444;
            --success: #10B981;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-body);
            background-color: #fff;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
        }

        /* Left Branding Panel */
        .branding-panel {
            flex: 1.2;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem 6rem;
            position: relative;
            overflow: hidden;
            color: #fff;
        }

        .branding-content {
            position: relative;
            z-index: 2;
        }

        .branding-bg-circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -100px;
        }

        .circle-2 {
            width: 250px;
            height: 250px;
            bottom: -50px;
            left: -50px;
        }

        .logo-container {
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 0.85rem;
        }

        .logo-text {
            font-family: var(--font-heading);
            font-size: var(--text-5xl);
            font-weight: var(--font-weight-extrabold);
            color: #ffffff;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
        }

        .crm-tag {
            font-size: var(--text-sm);
            font-weight: var(--font-weight-bold);
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 1rem;
            display: block;
        }

        .branding-panel h1 {
            font-family: var(--font-heading);
            font-size: var(--text-6xl);
            line-height: 1.1;
            font-weight: var(--font-weight-bold);
            color: #ffffff;
            max-width: 500px;
            margin: 0 0 1.5rem 0;
        }

        .branding-desc {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.8);
            max-width: 400px;
            line-height: 1.6;
        }

        /* Right Form Panel */
        .form-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem 6rem;
            background-color: #fff;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
        }

        .form-header {
            margin-bottom: 2.5rem;
        }

        .form-header h2 {
            font-family: var(--font-heading);
            font-size: var(--text-4xl);
            font-weight: var(--font-weight-bold);
            color: #1a1a1a;
            margin: 0 0 0.5rem 0;
        }

        .form-header p {
            color: #6b7280;
            font-size: var(--text-lg);
        }

        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: var(--text-lg);
            display: none;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .message.error {
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
            color: #dc2626;
            display: flex;
        }

        .message.success {
            background-color: #ecfdf5;
            border: 1px solid #d1fae5;
            color: #047857;
            display: flex;
        }

        .message i {
            margin-top: 3px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: var(--text-lg);
            font-weight: var(--font-weight-medium);
            color: #6b7280;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            box-sizing: border-box;
            width: 100%;
            padding: 0.85rem 3rem 0.85rem 3rem;
            font-size: 1.1rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            background-color: #f9fafb;
            color: #1a1a1a;
            transition: all 0.2s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .input-wrapper > i {
            position: absolute;
            left: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 1.1rem;
            transition: all 0.2s ease;
        }

        .input-wrapper input:focus + i {
            color: #3b82f6;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
            z-index: 10;
        }

        .password-toggle i {
            font-size: 1.2rem;
        }

        .password-toggle:hover {
            color: #4b5563;
        }

        .submit-btn {
            width: 100%;
            background-color: #3b82f6;
            color: #fff;
            border: none;
            padding: 1rem;
            font-size: var(--text-2xl);
            font-weight: var(--font-weight-semibold);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .submit-btn:hover:not(:disabled) {
            background-color: #2563eb;
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            .branding-panel { padding: 3rem; }
            .form-panel { padding: 3rem; }
            .branding-panel h1 { font-size: 2.5rem; }
        }

        @media (max-width: 768px) {
            .login-container { flex-direction: column; }
            .branding-panel { display: none; }
            .form-panel { padding: 2rem; min-height: 100vh; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Left Branding Panel -->
        <div class="branding-panel">
            <div class="branding-content">
                <div class="logo-container">
                    <div style="background: white; border-radius: 10px; padding: 5px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;">
                        <div style="width: 20px; height: 20px; background-color: #3b82f6; border-radius: 50%;"></div>
                    </div>
                    <div class="logo-text">Softrate</div>
                </div>
                <span class="crm-tag">Workforce Management</span>
                <h1>Empowering your team with smart automation.</h1>
                <p class="branding-desc">Manage attendance, leave, and performance in one unified workspace.</p>
            </div>
            <div class="branding-bg-circles">
                <div class="circle circle-1"></div>
                <div class="circle circle-2"></div>
            </div>
        </div>

        <!-- Right Form Panel -->
        <div class="form-panel">
            <div class="login-card">
                <div class="form-header">
                    <h2>Reset Password</h2>
                    <p>Enter your new password below to regain access.</p>
                </div>

                <div id="responseMessage" class="message">
                    <i id="msgIcon" class="fa-solid fa-circle-exclamation"></i>
                    <span id="msgText"></span>
                </div>

                <form id="resetForm">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="newPassword" placeholder="••••••••" required minlength="8">
                            <button type="button" class="password-toggle" onclick="toggleVisibility('newPassword', 'eyeNew')">
                                <i id="eyeNew" class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <small style="display:block; margin-top:0.5rem; font-size:0.8rem; color:#6b7280; line-height:1.4;">
                            Must be at least 8 chars, contain 1 uppercase letter and 1 symbol.
                        </small>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="8">
                            <button type="button" class="password-toggle" onclick="toggleVisibility('confirmPassword', 'eyeConfirm')">
                                <i id="eyeConfirm" class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="submit-btn">
                        <span id="btnText">Update Password</span>
                        <div class="spinner" id="loader"></div>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const resetForm = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const responseMessage = document.getElementById('responseMessage');
        const msgText = document.getElementById('msgText');
        const msgIcon = document.getElementById('msgIcon');

        // Extract token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showMsg('Invalid or missing reset token.', 'error');
            submitBtn.disabled = true;
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                return showMsg('Passwords do not match.', 'error');
            }

            const passwordRegex = /^(?=.*[A-Z])(?=.*[!@#$%^&*(),.?":{}|<>]).{8,}$/;
            if (!passwordRegex.test(newPassword)) {
                return showMsg('Password must be at least 8 characters, contain 1 uppercase letter, and 1 symbol.', 'error');
            }

            // Start Loading
            setLoading(true);
            responseMessage.style.display = 'none';

            try {
                const basePath = window.location.pathname.replace('/reset-password.html', '');
                const response = await fetch(`${basePath}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showMsg(data.message || 'Password reset successful! You can now log in.', 'success');
                    resetForm.reset();
                    submitBtn.disabled = true;
                } else {
                    showMsg(data.message || 'Something went wrong. Please try again.', 'error');
                }
            } catch (err) {
                showMsg('Connection error. Please check your internet.', 'error');
            } finally {
                setLoading(false);
            }
        });

        function showMsg(text, type) {
            msgText.textContent = text;
            responseMessage.className = `message ${type}`;
            if (type === 'error') {
                msgIcon.className = 'fa-solid fa-circle-exclamation';
            } else {
                msgIcon.className = 'fa-solid fa-circle-check';
            }
            responseMessage.style.display = 'flex';
        }

        function setLoading(isLoading) {
            if (isLoading) {
                btnText.style.display = 'none';
                loader.style.display = 'block';
                submitBtn.disabled = true;
            } else {
                btnText.style.display = 'block';
                loader.style.display = 'none';
                submitBtn.disabled = false;
            }
        }

        function toggleVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-solid fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fa-solid fa-eye';
            }
        }
    </script>
</body>
</html>
