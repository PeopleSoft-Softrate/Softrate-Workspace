server {
  listen 80;
  server_name _;

  client_max_body_size 50m;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location = / {
    return 302 /admin/;
  }

  location /admin/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /admin/index.html;
  }

  location /sales/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /sales/index.html;
  }

  location /hrms/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /hrms/index.html;
  }

  location /tickets/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /tickets/index.html;
  }

  location /finance/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /finance/index.html;
  }

  location ^~ /sales-api/ {
    rewrite ^/sales-api/(.*)$ /$1 break;
    proxy_pass http://sales-api:4000;
    proxy_http_version 1.1;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /crm-api/ {
    rewrite ^/crm-api/(.*)$ /$1 break;
    proxy_pass http://crm-api:4100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /tickets-api/ {
    rewrite ^/tickets-api/(.*)$ /$1 break;
    proxy_pass http://tickets-api:4300;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /finance-api/ {
    rewrite ^/finance-api/(.*)$ /$1 break;
    proxy_pass http://finance-api:4400;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /hrms-api/socket.io/ {
    rewrite ^/hrms-api/(.*)$ /$1 break;
    proxy_pass http://hrms-api:5001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /hrms-api/ {
    rewrite ^/hrms-api/(.*)$ /$1 break;
    proxy_pass http://hrms-api:5001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

