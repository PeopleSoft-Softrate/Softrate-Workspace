upstream sales_backend {
  server 127.0.0.1:4000;
}

upstream crm_backend {
  server 127.0.0.1:4100;
}

upstream tickets_backend {
  server 127.0.0.1:4300;
}

upstream finance_backend {
  server 127.0.0.1:4400;
}

upstream hrms_backend {
  server 127.0.0.1:5001;
}

server {
  listen 80;
  server_name your-subdomain.example.com;

  root /var/www/softrate;
  client_max_body_size 50m;

  location = / {
    return 302 /admin/;
  }

  location /admin/ {
    try_files $uri $uri/ /admin/index.html;
  }

  location /sales/ {
    try_files $uri $uri/ /sales/index.html;
  }

  location /hrms/ {
    try_files $uri $uri/ /hrms/index.html;
  }

  location /tickets/ {
    try_files $uri $uri/ /tickets/index.html;
  }

  location /finance/ {
    try_files $uri $uri/ /finance/index.html;
  }

  location ^~ /sales-api/ {
    rewrite ^/sales-api/(.*)$ /$1 break;
    proxy_pass http://sales_backend;
    proxy_http_version 1.1;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /crm-api/ {
    rewrite ^/crm-api/(.*)$ /$1 break;
    proxy_pass http://crm_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /tickets-api/ {
    rewrite ^/tickets-api/(.*)$ /$1 break;
    proxy_pass http://tickets_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /finance-api/ {
    rewrite ^/finance-api/(.*)$ /$1 break;
    proxy_pass http://finance_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /hrms-api/socket.io/ {
    rewrite ^/hrms-api/(.*)$ /$1 break;
    proxy_pass http://hrms_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /hrms-api/ {
    rewrite ^/hrms-api/(.*)$ /$1 break;
    proxy_pass http://hrms_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
