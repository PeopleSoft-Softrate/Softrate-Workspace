server {
  listen 80;
  listen [::]:80;
  server_name workspace.softrateglobal.com peoplesoft.softrateglobal.com dealvoice.softrateglobal.com;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type text/plain;
  }

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name workspace.softrateglobal.com;

  ssl_certificate /etc/letsencrypt/live/workspace.softrateglobal.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/workspace.softrateglobal.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  add_header Strict-Transport-Security "max-age=31536000" always;

  include /etc/nginx/snippets/workspace-routes.conf;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name peoplesoft.softrateglobal.com;

  ssl_certificate /etc/letsencrypt/live/peoplesoft.softrateglobal.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/peoplesoft.softrateglobal.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  add_header Strict-Transport-Security "max-age=31536000" always;

  location = / {
    return 302 /hrms/$is_args$args;
  }

  location /hrms/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /hrms/index.html;

    # Never cache index.html so browsers always get the latest JS chunk filenames
    location = /hrms/index.html {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
      add_header Pragma "no-cache" always;
      expires 0;
    }
  }


  location ^~ /hrms-api/socket.io/ {
    rewrite ^/hrms-api/(.*)$ /$1 break;
    proxy_pass http://hrms-api:5001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }

  location ^~ /hrms-api/ {
    rewrite ^/hrms-api/(.*)$ /$1 break;
    proxy_pass http://hrms-api:5001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    # Allow large file uploads (profile photos etc)
    client_max_body_size 50M;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name dealvoice.softrateglobal.com;

  ssl_certificate /etc/letsencrypt/live/dealvoice.softrateglobal.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/dealvoice.softrateglobal.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  add_header Strict-Transport-Security "max-age=31536000" always;

  location = / {
    return 302 /admin/$is_args$args;
  }

  location /admin/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /admin/index.html;
  }

  location /sales/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /sales/index.html;
  }

  location ^~ /sales-api/ {
    rewrite ^/sales-api/(.*)$ /$1 break;
    proxy_pass http://sales-api:4000;
    proxy_http_version 1.1;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /crm-api/ {
    rewrite ^/crm-api/(.*)$ /$1 break;
    proxy_pass http://crm-api:4100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /tickets-api/ {
    rewrite ^/tickets-api/(.*)$ /$1 break;
    proxy_pass http://tickets-api:4300;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
