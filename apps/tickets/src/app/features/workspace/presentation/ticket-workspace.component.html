<ng-container *ngIf="auth.state$ | async as authState">
  <ng-container *ngIf="tickets.view$ | async as ticketView">
    <div class="client-shell" [class.sidebar-minimized]="vm.sidebarMinimized">
      <div class="crm-sidebar-overlay" [class.active]="vm.sidebarOpen" (click)="vm.closeSidebar()"></div>

      <aside class="crm-sidebar" [class.open]="vm.sidebarOpen" [class.minimized]="vm.sidebarMinimized">
        <div class="sidebar-brand">
          <img [src]="vm.sidebarMinimized ? 'assets/icon/logo 2.png' : 'assets/icon/logo.png'" alt="DealVoice Logo" class="sidebar-logo">
        </div>

        <nav class="sidebar-nav" aria-label="Client ticket navigation">
          <label class="sidebar-search" for="ticketSidebarSearch">
            <span class="sidebar-search-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="6"></circle>
                <path d="m20 20-4.35-4.35"></path>
              </svg>
            </span>
            <input
              id="ticketSidebarSearch"
              type="text"
              placeholder="Search features"
              autocomplete="off"
              [(ngModel)]="vm.sidebarFeatureSearch"
            />
          </label>

          <ng-container *ngFor="let group of vm.filteredNavGroups">
            <div class="sidebar-group-label">{{ group.label }}</div>
            <button
              class="sidebar-link"
              type="button"
              *ngFor="let item of group.items"
              [class.active]="isActive(item, ticketView.status)"
              [title]="vm.sidebarMinimized ? item.label : ''"
              (click)="handleNav(item)"
            >
              <span class="sidebar-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path [attr.d]="item.icon" />
                </svg>
              </span>
              <span class="sidebar-label">{{ item.label }}</span>
            </button>
          </ng-container>
        </nav>

        <button
          class="edge-sidebar-toggle"
          type="button"
          (click)="vm.toggleSidebarMinimized()"
          [class.minimized]="vm.sidebarMinimized"
          [title]="vm.sidebarMinimized ? 'Expand Sidebar' : 'Collapse Sidebar'"
          [attr.aria-label]="vm.sidebarMinimized ? 'Expand sidebar' : 'Collapse sidebar'"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>
      </aside>

      <section class="crm-stage">
        <header class="crm-topbar">
          <button class="topbar-sidebar-toggle" type="button" (click)="vm.toggleSidebar()" aria-label="Open navigation">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>

          <div class="topbar-page-title">Client Tickets</div>

          <label class="topbar-search" for="ticketGlobalSearch" [class.search-loading]="ticketView.loading" [attr.aria-busy]="ticketView.loading">
            <span class="topbar-search-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="6"></circle>
                <path d="m20 20-4.35-4.35"></path>
              </svg>
            </span>
            <input
              id="ticketGlobalSearch"
              class="topbar-input"
              type="text"
              placeholder="Search tickets, services, or message text"
              autocomplete="off"
              [ngModel]="ticketView.search"
              (ngModelChange)="tickets.setSearch($event)"
            />
            <span *ngIf="ticketView.loading" class="topbar-search-spinner" aria-hidden="true"></span>
          </label>

          <div class="topbar-actions">
            <button class="topbar-metric" type="button" (click)="tickets.setStatus('Open')">
              <span class="topbar-metric-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M6 4h12v16H6z" />
                  <path d="M9 8h6 M9 12h6 M9 16h3" />
                </svg>
              </span>
              <span class="topbar-metric-copy">
                <span class="utility-label">Open</span>
                <span class="utility-value">{{ ticketView.counts.open }}</span>
              </span>
            </button>

            <button class="topbar-metric" type="button" (click)="tickets.setStatus('Waiting on Client')">
              <span class="topbar-metric-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M12 8v5l3 2" />
                  <path d="M21 12a9 9 0 1 1-9-9" />
                </svg>
              </span>
              <span class="topbar-metric-copy">
                <span class="utility-label">Waiting</span>
                <span class="utility-value">{{ ticketView.counts.waiting }}</span>
              </span>
            </button>

            <button class="topbar-create-button" type="button" (click)="tickets.openCreate()">Raise Ticket</button>

            <div class="profile-dropdown" [class.open]="vm.profileMenuOpen">
              <button
                class="profile-trigger"
                type="button"
                aria-haspopup="menu"
                [attr.aria-expanded]="vm.profileMenuOpen"
                (click)="vm.toggleProfileMenu($event)"
              >
                <div class="topbar-user">
                  <div class="user-avatar-shell">
                    <div class="user-avatar" aria-hidden="true">{{ vm.initials(authState.session?.client?.clientCompanyName) }}</div>
                    <span class="user-status-dot" aria-hidden="true"></span>
                  </div>
                  <div class="user-copy">
                    <div class="user-name">{{ authState.session?.client?.clientCompanyName || 'Client' }}</div>
                    <div class="user-meta">{{ authState.session?.client?.clientEmail }}</div>
                  </div>
                  <span class="profile-chevron" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                      <path d="m6 9 6 6 6-6" />
                    </svg>
                  </span>
                </div>
              </button>

              <div class="profile-menu" *ngIf="vm.profileMenuOpen" role="menu" (click)="$event.stopPropagation()">
                <div class="profile-menu-header">
                  <div class="profile-menu-avatar">{{ vm.initials(authState.session?.client?.clientCompanyName) }}</div>
                  <div class="profile-menu-copy">
                    <div class="profile-menu-name">{{ authState.session?.client?.clientCompanyName || 'Client' }}</div>
                    <div class="profile-menu-meta">{{ authState.session?.client?.clientEmail || '-' }}</div>
                    <div class="profile-menu-code">{{ authState.session?.client?.companyCode || '-' }}</div>
                    <div class="profile-menu-status">Active now</div>
                  </div>
                </div>
                <div class="profile-menu-divider"></div>
                <button class="profile-menu-item profile-menu-item-danger" type="button" role="menuitem" (click)="auth.logout()">
                  <span class="profile-menu-item-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                      <path d="m16 17 5-5-5-5" />
                      <path d="M21 12H9" />
                    </svg>
                  </span>
                  <span>Logout</span>
                </button>
              </div>
            </div>
          </div>
        </header>

        <main class="client-main">
          <app-ticket-inbox></app-ticket-inbox>
        </main>
      </section>
    </div>
  </ng-container>
</ng-container>
