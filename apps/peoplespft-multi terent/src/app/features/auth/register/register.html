<div class="login-container">
  <!-- Left Branding Panel -->
  <div class="branding-panel">
    <div class="branding-content">
      <div class="logo-container">
        <img src="logo/peoplesoft.png" alt="peoplesoft Logo" class="brand-logo-img">
        <div class="logo-text">PeopleSoft</div>
      </div>
      <span class="crm-tag">Workforce Management</span>
      <h1>Empowering your team with smart automation.</h1>
      <p class="branding-desc">Manage attendance, leave, and performance in one unified workspace.</p>
    </div>
    <div class="branding-bg-circles">
      <div class="circle circle-1"></div>
      <div class="circle circle-2"></div>
    </div>
  </div>

  <!-- Right Form Panel -->
  <div class="form-panel">
    <div class="login-card">
      <div class="form-header">
        <h2>Register Company</h2>
        <p>Create your new tenant account</p>
      </div>

      <div class="error-banner" *ngIf="errorMessage()">
        <i class="fa-solid fa-circle-exclamation"></i>
        {{ errorMessage() }}
      </div>

      <form (ngSubmit)="onSubmit()" #registerForm="ngForm" autocomplete="off">
        <!-- Company Name Field -->
        <div class="form-group">
          <label for="companyName">Company Name</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-building"></i>
            <input 
              id="companyName"
              type="text" 
              [(ngModel)]="formData.companyName" 
              name="companyName" 
              required 
              placeholder="e.g. Acme Corp">
          </div>
        </div>

        <!-- Company Code Field -->
        <div class="form-group">
          <label for="companyCode">Company Code</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-tag"></i>
            <input 
              id="companyCode"
              type="text" 
              [(ngModel)]="formData.companyCode" 
              name="companyCode" 
              required 
              placeholder="e.g. ACME123">
          </div>
        </div>

        <!-- Admin Full Name Field -->
        <div class="form-group">
          <label for="hrName">Admin Full Name</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-user"></i>
            <input 
              id="hrName"
              type="text" 
              [(ngModel)]="formData.hrName" 
              name="hrName" 
              required 
              placeholder="e.g. Praveen">
          </div>
        </div>

        <!-- Admin Email Field -->
        <div class="form-group">
          <label for="hrEmail">Admin Email</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-envelope"></i>
            <input 
              id="hrEmail"
              type="email" 
              [(ngModel)]="formData.hrEmail" 
              name="hrEmail" 
              required 
              placeholder="admin@company.com">
          </div>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="hrPassword">Password</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input 
              id="hrPassword"
              type="password" 
              [(ngModel)]="formData.hrPassword" 
              name="hrPassword" 
              required 
              placeholder="••••••••">
          </div>
        </div>

        <button type="submit" class="submit-btn" [disabled]="isLoading() || !registerForm.form.valid">
          <span *ngIf="!isLoading()">Register Account</span>
          <div class="spinner" *ngIf="isLoading()"></div>
        </button>

        <div class="form-footer">
          <a routerLink="/login">Already have an account? Sign in</a>
        </div>
      </form>
    </div>
  </div>
</div>
