services:
  gateway:
    build:
      context: .
      dockerfile: deploy/docker/gateway.Dockerfile
    depends_on:
      - sales-api
      - crm-api
      - tickets-api
      - finance-api
      - hrms-api
    ports:
      - "${GATEWAY_PORT:-80}:80"
    restart: unless-stopped

  sales-api:
    build:
      context: .
      dockerfile: deploy/docker/services/sales-api.Dockerfile
    env_file:
      - services/sales/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      FRONTEND_URL: "${PUBLIC_BASE_URL:-http://localhost}/admin"
    expose:
      - "4000"
    restart: unless-stopped

  crm-api:
    build:
      context: .
      dockerfile: deploy/docker/services/crm-api.Dockerfile
    env_file:
      - services/crm/.env
    environment:
      NODE_ENV: production
      CRM_PORT: 4100
    expose:
      - "4100"
    restart: unless-stopped

  tickets-api:
    build:
      context: .
      dockerfile: deploy/docker/services/tickets-api.Dockerfile
    env_file:
      - services/tickets/.env
    environment:
      NODE_ENV: production
      TICKETS_PORT: 4300
      TICKET_UPLOAD_DIR: uploads/tickets
    expose:
      - "4300"
    restart: unless-stopped
    volumes:
      - tickets_uploads:/app/uploads

  finance-api:
    build:
      context: .
      dockerfile: deploy/docker/services/finance-api.Dockerfile
    env_file:
      - services/finance/.env
    environment:
      NODE_ENV: production
      FINANCE_PORT: 4400
      HRMS_MONGO_URI: "${FINANCE_HRMS_MONGO_URI:-}"
    expose:
      - "4400"
    restart: unless-stopped

  hrms-api:
    build:
      context: .
      dockerfile: deploy/docker/services/hrms-api.Dockerfile
    env_file:
      - services/hrms/.env
    environment:
      NODE_ENV: production
      PORT: 5001
      BACKEND_URL: "${PUBLIC_BASE_URL:-http://localhost}/hrms-api"
    expose:
      - "5001"
    restart: unless-stopped

volumes:
  tickets_uploads:

