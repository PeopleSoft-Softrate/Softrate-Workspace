  image_picker: ^1.2.1
  image_cropper: ^12.2.1
  connectivity_plus: ^7.1.1
  hugeicons: ^1.1.6




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/peoplesoft.png"


flutter:
