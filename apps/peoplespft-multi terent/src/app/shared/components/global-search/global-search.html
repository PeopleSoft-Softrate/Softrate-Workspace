<div class="gs-wrapper" (keydown.escape)="close()">
  <!-- Search Bar -->
  <div class="gs-bar" [class.focused]="isOpen()">
    <svg class="gs-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input
      #searchInput
      class="gs-input"
      type="text"
      placeholder="Search for employees, interns, or documents..."
      [value]="query()"
      (input)="onInput($event)"
      (focus)="onFocus()"
      (blur)="onBlur()"
      autocomplete="off"
    >
    <button *ngIf="query()" class="gs-clear" (mousedown)="clearQuery($event)" title="Clear search">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
    <span class="gs-kbd">⌘K</span>
  </div>

  <!-- Dropdown Results -->
  <div class="gs-dropdown" *ngIf="isOpen() && (query().length > 0)">
    <!-- Loading -->
    <div class="gs-state" *ngIf="searchService.isLoading()">
      <div class="gs-spinner"></div>
      <span>Loading data…</span>
    </div>

    <!-- No Results -->
    <div class="gs-state" *ngIf="!searchService.isLoading() && searchService.results().length === 0">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <span>No results for "<strong>{{ query() }}</strong>"</span>
    </div>

    <!-- Results -->
    <ng-container *ngIf="!searchService.isLoading() && searchService.results().length > 0">
      <!-- Employees Group -->
      <div *ngIf="employees().length > 0">
        <div class="gs-group-label">Employees</div>
        <button class="gs-result-item" *ngFor="let r of employees()" (mousedown)="navigate(r)">
          <div class="gs-avatar employee">{{ r.initials }}</div>
          <div class="gs-result-info">
            <span class="gs-result-name">{{ r.name }}</span>
            <span class="gs-result-sub">{{ r.subtitle }}</span>
          </div>
          <div class="gs-result-badge emp">Employee</div>
        </button>
      </div>

      <!-- Interns Group -->
      <div *ngIf="interns().length > 0">
        <div class="gs-group-label">Interns</div>
        <button class="gs-result-item" *ngFor="let r of interns()" (mousedown)="navigate(r)">
          <div class="gs-avatar intern">{{ r.initials }}</div>
          <div class="gs-result-info">
            <span class="gs-result-name">{{ r.name }}</span>
            <span class="gs-result-sub">{{ r.subtitle }}</span>
          </div>
          <div class="gs-result-badge int">Intern</div>
        </button>
      </div>
    </ng-container>

    <!-- Footer hint -->
    <div class="gs-footer" *ngIf="!searchService.isLoading() && searchService.results().length > 0">
      <span>Press <kbd>Esc</kbd> to close</span>
    </div>
  </div>
</div>

<!-- Backdrop -->
<div class="gs-backdrop" *ngIf="isOpen() && query().length > 0" (click)="close()"></div>
