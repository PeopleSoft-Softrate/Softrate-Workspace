server {
  listen 80;
  listen [::]:80;
  server_name workspace.softrateglobal.com;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type text/plain;
  }

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location / {
    return 301 https://workspace.softrateglobal.com$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name workspace.softrateglobal.com;

  ssl_certificate /etc/letsencrypt/live/workspace.softrateglobal.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/workspace.softrateglobal.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  add_header Strict-Transport-Security "max-age=31536000" always;

  include /etc/nginx/snippets/workspace-routes.conf;
}
